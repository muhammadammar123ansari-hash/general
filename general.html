<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz World - Advanced Quiz</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Segoe UI',sans-serif;
      scroll-behavior:smooth;
    }

    body{
      background:black;
      color:white;
      overflow-x:hidden;
    }

    header{
      text-align:center;
      padding:25px;
      background:linear-gradient(90deg,#ff0080,#00d9ff,#00ff6a);
      position:sticky;
      top:0;
      z-index:999;
      box-shadow:0 0 20px rgba(0,255,255,0.6);
    }

    header h1{
      font-size:42px;
      font-weight:900;
      color:white;
      text-shadow:0 0 15px black;
      letter-spacing:2px;
    }

    header p{
      margin-top:8px;
      font-weight:bold;
      color:black;
    }

    .container{
      max-width:1100px;
      margin:auto;
      padding:30px 15px;
    }

    .category-select{
      display:flex;
      justify-content:center;
      flex-wrap:wrap;
      gap:12px;
      margin-bottom:20px;
    }

    .category-select button{
      padding:12px 18px;
      border:none;
      border-radius:15px;
      cursor:pointer;
      font-size:15px;
      font-weight:bold;
      background:linear-gradient(90deg,#ff0080,#00d9ff);
      color:black;
      transition:0.3s;
      box-shadow:0 0 12px rgba(0,255,255,0.4);
    }

    .category-select button:hover{
      transform:scale(1.08);
      box-shadow:0 0 20px rgba(255,0,200,0.8);
    }

    .quiz-box{
      background:rgba(255,255,255,0.05);
      border:2px solid rgba(0,255,255,0.2);
      padding:25px;
      border-radius:20px;
      box-shadow:0 0 20px rgba(255,0,255,0.2);
      animation:fadeIn 0.8s ease;
    }

    .quiz-title{
      text-align:center;
      font-size:28px;
      font-weight:900;
      padding:12px;
      border-radius:15px;
      background:linear-gradient(90deg,#ff0000,#ffcc00,#00ff6a,#00d9ff,#aa00ff);
      color:black;
      margin-bottom:20px;
    }

    .timer-box{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:15px;
      font-size:18px;
      font-weight:bold;
      color:cyan;
    }

    .progress-bar{
      width:100%;
      height:15px;
      background:#111;
      border-radius:10px;
      overflow:hidden;
      border:1px solid rgba(0,255,255,0.4);
      margin-bottom:20px;
    }

    .progress{
      height:100%;
      width:0%;
      background:linear-gradient(90deg,#ff0080,#00d9ff,#00ff6a);
      transition:0.4s;
    }

    .question{
      font-size:22px;
      font-weight:bold;
      margin-bottom:18px;
      background:linear-gradient(90deg,#ff0080,#00d9ff,#00ff6a);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .options{
      display:grid;
      gap:12px;
    }

    .options button{
      padding:12px;
      border:none;
      border-radius:12px;
      font-size:16px;
      cursor:pointer;
      background:#111;
      color:white;
      border:2px solid rgba(0,255,255,0.3);
      transition:0.3s;
    }

    .options button:hover{
      transform:scale(1.03);
      background:linear-gradient(90deg,#ff0080,#00d9ff);
      color:black;
      font-weight:bold;
    }

    .options button:disabled{
      cursor:not-allowed;
      opacity:0.7;
    }

    .result{
      margin-top:18px;
      font-size:18px;
      font-weight:bold;
      text-align:center;
    }

    .next-btn{
      margin-top:20px;
      width:100%;
      padding:12px;
      border:none;
      border-radius:15px;
      background:linear-gradient(90deg,#ff0080,#00d9ff);
      color:black;
      font-weight:bold;
      font-size:18px;
      cursor:pointer;
      transition:0.3s;
      display:none;
    }

    .next-btn:hover{
      transform:scale(1.05);
      box-shadow:0 0 20px rgba(0,255,255,0.8);
    }

    .score-box{
      margin-top:20px;
      padding:12px;
      text-align:center;
      border-radius:15px;
      background:rgba(255,255,255,0.06);
      border:2px solid rgba(0,255,255,0.3);
      font-size:20px;
      font-weight:bold;
      color:cyan;
    }

    footer{
      text-align:center;
      padding:20px;
      background:#0a0a0a;
      color:#aaa;
      margin-top:30px;
      border-top:2px solid rgba(255,255,255,0.1);
    }

    @keyframes fadeIn{
      from{opacity:0; transform:translateY(40px);}
      to{opacity:1; transform:translateY(0);}
    }
  </style>
</head>

<body>

<header>
  <h1>🌟 QUIZ WORLD 🌟</h1>
  <p>Advanced Quiz | Timer | Progress Bar | Random Questions</p>
</header>

<div class="container">

  <div class="category-select">
    <button onclick="loadCategory('gk')">🌍 GK</button>
    <button onclick="loadCategory('science')">🔬 Science</button>
    <button onclick="loadCategory('daily')">🏠 Daily Life</button>
    <button onclick="loadCategory('islamic')">🕌 Islamic</button>
    <button onclick="loadCategory('computer')">💻 Computer</button>
    <button onclick="loadCategory('math')">➗ Math</button>
    <button onclick="loadCategory('english')">📘 English</button>
    <button onclick="loadCategory('sports')">🏆 Sports</button>
  </div>

  <div class="quiz-box" id="quizBox">
    <div class="quiz-title" id="quizTitle">Select a Category to Start Quiz</div>

    <div class="timer-box">
      <div>⏳ Time Left: <span id="timer">0</span>s</div>
      <div>📌 Question: <span id="qno">0</span>/<span id="total">0</span></div>
    </div>

    <div class="progress-bar">
      <div class="progress" id="progress"></div>
    </div>

    <div class="question" id="questionText">Choose a category above 👆</div>

    <div class="options" id="optionsBox"></div>

    <div class="result" id="resultText"></div>

    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next Question ➡</button>

    <div class="score-box">
      Score: <span id="score">0</span>
    </div>
  </div>

</div>

<footer>
  <h3 style="color:cyan;">🌟 Quiz World 🌟</h3>
  <p>Made with ❤️ | Full Advanced Quiz Website</p>
</footer>

      {q:"Bat and ball game?", options:["Cricket","Hockey","Football","Tennis"], answer:0},

  let questions = [];
  let currentQuestion = 0;
  let score = 0;
  let timer;
  let timeLeft = 15; // 15 seconds each question

  function shuffleArray(arr){
    return arr.sort(()=>Math.random()-0.5);
  }

  function loadCategory(cat){
    questions = shuffleArray([...allQuestions[cat]]);
    currentQuestion = 0;
    score = 0;

    document.getElementById("score").innerText = score;
    document.getElementById("total").innerText = questions.length;
    document.getElementById("quizBox").style.animation = "fadeIn 0.8s ease";

    let titleMap = {
      gk: "🌍 General Knowledge Quiz",
      science: "🔬 Science Quiz",
      daily: "🏠 Daily Life Quiz",
      islamic: "🕌 Islamic Quiz",
      computer: "💻 Computer Quiz",
      math: "➗ Math Quiz",
      english: "📘 English Quiz",
      sports: "🏆 Sports Quiz"
    };

    document.getElementById("quizTitle").innerText = titleMap[cat];
    loadQuestion();
  }

  function startTimer(){
    clearInterval(timer);
    timeLeft = 15;
    document.getElementById("timer").innerText = timeLeft;

    timer = setInterval(()=>{
      timeLeft--;
      document.getElementById("timer").innerText = timeLeft;

      if(timeLeft <= 0){
        clearInterval(timer);
        autoWrong();
      }
    },1000);
  }

  function updateProgress(){
    let percent = ((currentQuestion) / questions.length) * 100;
    document.getElementById("progress").style.width = percent + "%";
  }

  function loadQuestion(){
    document.getElementById("resultText").innerHTML = "";
    document.getElementById("nextBtn").style.display = "none";

    document.getElementById("qno").innerText = currentQuestion + 1;

    updateProgress();
    startTimer();

    const qData = questions[currentQuestion];
    document.getElementById("questionText").innerText = (currentQuestion + 1) + ". " + qData.q;

    const optionsBox = document.getElementById("optionsBox");
    optionsBox.innerHTML = "";

    qData.options.forEach((opt, index)=>{
      const btn = document.createElement("button");
      btn.innerText = opt;
      btn.onclick = ()=>checkAnswer(index);
      optionsBox.appendChild(btn);
    });
  }

  function checkAnswer(selectedIndex){
    clearInterval(timer);

    const qData = questions[currentQuestion];
    const resultText = document.getElementById("resultText");
    const optionButtons = document.querySelectorAll("#optionsBox button");

    optionButtons.forEach(btn=>btn.disabled=true);

    if(selectedIndex === qData.answer){
      correctSound.play();
      resultText.style.color="#00ff6a";
      resultText.innerHTML="✅ Correct Answer!";
      score++;
    } else {
      wrongSound.play();
      resultText.style.color="red";
      resultText.innerHTML="❌ Wrong Answer! <br> Correct Answer: <b style='color:cyan;'>" + qData.options[qData.answer] + "</b>";
    }

    document.getElementById("score").innerText = score;
    document.getElementById("nextBtn").style.display="block";
  }

  function autoWrong(){
    const qData = questions[currentQuestion];
    const resultText = document.getElementById("resultText");

    wrongSound.play();
    resultText.style.color="orange";
    resultText.innerHTML="⏰ Time Over! <br> Correct Answer: <b style='color:cyan;'>" + qData.options[qData.answer] + "</b>";

    const optionButtons = document.querySelectorAll("#optionsBox button");
    optionButtons.forEach(btn=>btn.disabled=true);

    document.getElementById("nextBtn").style.display="block";
  }

  function nextQuestion(){
    currentQuestion++;

    if(currentQuestion < questions.length){
      loadQuestion();
    } else {
      clearInterval(timer);
      document.getElementById("progress").style.width = "100%";

      document.getElementById("quizBox").innerHTML = `
        <div class="quiz-title">🎉 Quiz Completed!</div>

        <h2 style="text-align:center; color:cyan; font-size:30px;">Result</h2>

        <p style="text-align:center; margin-top:15px; font-size:22px;">
          Your Score: <span style="color:#00ff6a; font-weight:bold;">${score}</span> / ${questions.length}
        </p>

        <p style="text-align:center; margin-top:10px; font-size:18px; color:#aaa;">
          Thanks for playing Quiz World 😄
        </p>

        <button style="
          margin-top:20px;
          width:100%;
          padding:12px;
          border:none;
          border-radius:15px;
          background:linear-gradient(90deg,#ff0080,#00d9ff);
          font-size:18px;
          font-weight:bold;
          cursor:pointer;
        " onclick="location.reload()">Restart Quiz 🔄</button>
      `;
    }
  }
</script>

</body>
</html>
